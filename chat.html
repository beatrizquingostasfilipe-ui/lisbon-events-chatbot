<!DOCTYPE html>
<html lang="pt">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <meta charset="UTF-8">
  <title>🎉 Lisbon Events Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { width: 480px; height: 620px; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
    #header { background: #e63946; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
    #header span { font-size: 13px; font-weight: normal; opacity: 0.85; display: block; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg.bot p { margin-bottom: 8px; }
    .msg.bot strong { font-weight: bold; }
    .msg.bot a { color: #e63946; }
    .msg.bot ul, .msg.bot ol { padding-left: 16px; margin-bottom: 8px; }
    .msg.bot li { margin-bottom: 4px; }
    .msg.bot h1, .msg.bot h2, .msg.bot h3 { margin-bottom: 6px; font-weight: bold; }
    .msg.user::before {
    content: "Tu: ";
    font-weight: bold;
    }
    .msg.bot::before {
        content: "Bot: ";
        font-weight: bold;
        color: #e63946;
    }
        #input-area { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
    #input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
    #input:focus { border-color: #e63946; }
    #send { background: #e63946; color: white; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 14px; }
    #send:hover { background: #c1121f; }
    #send:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="header">
    🎉 Lisbon Events Bot
    <span>Descobre eventos em Lisboa • Powered by Agno + Groq</span>
  </div>
  <div id="messages">
    <div class="msg bot">Olá! 👋 Sou o teu guia de eventos em Lisboa. Pergunta-me sobre festas, networking, eventos grátis... O que queres fazer?</div>
  </div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Ex: Há festas esta semana?" />
    <button id="send" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
  let sessionId = crypto.randomUUID();

  document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    document.getElementById("send").disabled = true;

    appendMsg(text, "user");
    const loading = appendMsg("A pensar...", "bot loading");

    try {
      const res = await fetch("http://localhost:8000/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });

      const data = await res.json();
      const reply = data?.reply || "Não consegui obter resposta.";
      loading.innerHTML = marked.parse(reply);
      loading.classList.remove("loading");
    } catch (e) {
      loading.textContent = "Erro ao ligar ao servidor.";
      loading.classList.remove("loading");
    }

    document.getElementById("send").disabled = false;
    document.getElementById("input").focus();
  }

function appendMsg(text, cls) {
    const div = document.createElement("div");
    div.className = `msg ${cls}`;
    if (cls.includes("bot") && !cls.includes("loading")) {
        div.innerHTML = marked.parse(text);
    } else {
        div.textContent = text;
    }
    const msgs = document.getElementById("messages");
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
}
</script>
</body>
</html>
